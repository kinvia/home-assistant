blueprint:
  name: Kinvia — Proactive incident reporting
  description: >
    ⚠️ **IMPORTANT: Rename this automation before saving!** (e.g., "Kinvia - Main House Incident Reporting").

    Reports Home Assistant incidents to Kinvia (Dumb Edge).
    Kinvia evaluates priority dynamically using server-side rules.

    Monitors entities by domain (no manual entity selection).
    Kinvia deduplicates open tickets for the same entity and incident type.
  domain: automation
  input:
    kinvia_url:
      name: Kinvia base URL
      description: >
        The base URL of your Kinvia instance. Format must be https://URL:PORT (no trailing slash).
      selector:
        text:
    kinvia_api_key:
      name: Inbound Webhook Secret
      description: >
        The Inbound Webhook Secret configured for this installation in the Kinvia app.
      selector:
        text:
          type: password
    monitored_domains:
      name: Dominios a monitorizar
      description: >
        Dominios cuyas entidades se vigilan por desconexiones (unavailable/unknown)
        y problemas de sistema (state = problem). Las baterías se detectan por device_class
        en cualquier dominio.
      default:
        - light
        - switch
        - binary_sensor
        - sensor
        - cover
        - climate
        - lock
        - fan
        - camera
        - media_player
        - device_tracker
        - vacuum
        - valve
        - water_heater
      selector:
        select:
          multiple: true
          options:
            - light
            - switch
            - binary_sensor
            - sensor
            - cover
            - climate
            - lock
            - fan
            - camera
            - media_player
            - device_tracker
            - vacuum
            - valve
            - water_heater
            - humidifier
            - number
            - select
            - button
    excluded_entities:
      name: Entidades excluidas
      description: >
        Entidades concretas que no deben generar incidencias aunque pertenezcan
        a un dominio monitorizado (p. ej. sun.sun, helpers internos).
      default: []
      selector:
        entity:
          multiple: true
    battery_threshold:
      name: Battery threshold (%)
      description: Report when battery entities cross below this percentage.
      default: 15
      selector:
        number:
          min: 0
          max: 100
          mode: slider
          unit_of_measurement: "%"

variables:
  kinvia_url: !input kinvia_url
  kinvia_api_key: !input kinvia_api_key
  monitored_domains: !input monitored_domains
  excluded_entities: !input excluded_entities
  battery_threshold: !input battery_threshold

trigger:
  - id: state_event
    platform: event
    event_type: state_changed
  - id: repair_event
    platform: event
    event_type: repairs_issue_registry_updated

condition:
  - condition: or
    conditions:
      - condition: template
        value_template: "{{ trigger.id == 'repair_event' }}"
      - condition: and
        conditions:
          - condition: template
            value_template: "{{ trigger.id == 'state_event' }}"
          - condition: or
            conditions:
              - condition: template
                value_template: >-
                  {% set entity_id = trigger.event.data.entity_id %}
                  {% set domain = entity_id.split('.')[0] %}
                  {% set old = trigger.event.data.old_state.state if trigger.event.data.old_state else '' %}
                  {% set new = trigger.event.data.new_state.state if trigger.event.data.new_state else '' %}
                  {{ domain in monitored_domains
                     and entity_id not in excluded_entities
                     and old not in ['unavailable', 'unknown', 'none', '']
                     and new in ['unavailable', 'unknown'] }}
              - condition: template
                value_template: >-
                  {% set entity_id = trigger.event.data.entity_id %}
                  {% set old = trigger.event.data.old_state.state if trigger.event.data.old_state else '' %}
                  {% set new = trigger.event.data.new_state.state if trigger.event.data.new_state else '' %}
                  {% set old_f = old | float(default=999) %}
                  {% set new_f = new | float(default=999) %}
                  {{ entity_id not in excluded_entities
                     and state_attr(entity_id, 'device_class') == 'battery'
                     and new_f < battery_threshold
                     and old_f >= battery_threshold }}
              - condition: template
                value_template: >-
                  {% set entity_id = trigger.event.data.entity_id %}
                  {% set domain = entity_id.split('.')[0] %}
                  {% set old = trigger.event.data.old_state.state if trigger.event.data.old_state else '' %}
                  {% set new = trigger.event.data.new_state.state if trigger.event.data.new_state else '' %}
                  {{ domain in monitored_domains
                     and entity_id not in excluded_entities
                     and new == 'problem'
                     and old != 'problem' }}

action:
  - variables:
      trigger_id: "{{ trigger.id }}"
      entity_id: >-
        {% if trigger.id == 'repair_event' %}
          repairs.{{ trigger.event.data.issue_id | default('unknown') }}
        {% else %}
          {{ trigger.event.data.entity_id }}
        {% endif %}
      friendly_name: >-
        {% if trigger.id == 'repair_event' %}
          HA Repair: {{ trigger.event.data.issue_id | default('unknown') }}
        {% else %}
          {{ state_attr(trigger.event.data.entity_id, 'friendly_name') | default(trigger.event.data.entity_id) }}
        {% endif %}
      domain: >-
        {% if trigger.id == 'repair_event' %}
          repairs
        {% else %}
          {{ trigger.event.data.entity_id.split('.')[0] }}
        {% endif %}
      device_class: >-
        {% if trigger.id == 'repair_event' %}
          {{ none }}
        {% else %}
          {{ state_attr(trigger.event.data.entity_id, 'device_class') | default(none) }}
        {% endif %}
      entity_state: >-
        {% if trigger.id == 'repair_event' %}
          updated
        {% else %}
          {{ trigger.event.data.new_state.state if trigger.event.data.new_state else '' }}
        {% endif %}
      incident_type: >-
        {% if trigger.id == 'repair_event' %}
          repair_event
        {% else %}
          {% set entity_id = trigger.event.data.entity_id %}
          {% set domain = entity_id.split('.')[0] %}
          {% set old = trigger.event.data.old_state.state if trigger.event.data.old_state else '' %}
          {% set new = trigger.event.data.new_state.state if trigger.event.data.new_state else '' %}
          {% set old_f = old | float(default=999) %}
          {% set new_f = new | float(default=999) %}
          {% if domain in monitored_domains
                and entity_id not in excluded_entities
                and old not in ['unavailable', 'unknown', 'none', '']
                and new in ['unavailable', 'unknown'] %}
            state_change
          {% elif entity_id not in excluded_entities
                and state_attr(entity_id, 'device_class') == 'battery'
                and new_f < battery_threshold
                and old_f >= battery_threshold %}
            battery_low
          {% elif domain in monitored_domains
                and entity_id not in excluded_entities
                and new == 'problem'
                and old != 'problem' %}
            system_problem
          {% else %}
            state_change
          {% endif %}
        {% endif %}
      details: >-
        {% if trigger.id == 'repair_event' %}
          {{ trigger.event.data | tojson }}
        {% else %}
          {{ '' }}
        {% endif %}
      payload_json:
        incident_type: "{{ incident_type }}"
        entity_id: "{{ entity_id }}"
        friendly_name: "{{ friendly_name }}"
        domain: "{{ domain }}"
        device_class: "{{ device_class if device_class is not none else '' }}"
        state: "{{ entity_state }}"
        details: "{{ details }}"

  - service: rest_command.kinvia_incident
    data:
      url: "{{ kinvia_url }}/api/v1/webhooks/incidents"
      api_key: "{{ kinvia_api_key }}"
      payload: "{{ payload_json | tojson }}"

mode: parallel
max: 20