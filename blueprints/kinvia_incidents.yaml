blueprint:
  name: Kinvia — Proactive incident reporting
  description: >
    ⚠️ **IMPORTANT: Rename this automation before saving!** (e.g., "Kinvia - Main House Incident Reporting").

    Reports Home Assistant incidents to Kinvia (Dumb Edge).
    Kinvia evaluates priority dynamically using server-side rules.
  domain: automation
  input:
    kinvia_url:
      name: Kinvia base URL
      description: >
        The base URL of your Kinvia instance. Format must be https://URL:PORT (no trailing slash).
      selector:
        text:
    kinvia_api_key:
      name: Inbound Webhook Secret
      description: >
        The Inbound Webhook Secret configured for this installation in the Kinvia app.
      selector:
        text:
          type: password
    monitored_entities:
      name: Dispositivos y Nodos a monitorizar
      description: Selecciona todas las luces, enchufes, sensores o grupos que quieres vigilar por caídas.
      selector:
        entity:
          multiple: true
    battery_entities:
      name: Sensores de Batería
      description: Selecciona todas las entidades de batería de la casa.
      selector:
        entity:
          device_class: battery
          multiple: true
    battery_threshold:
      name: Battery threshold (%)
      description: Report when battery entities fall below this percentage.
      default: 15
      selector:
        number:
          min: 0
          max: 100
          mode: slider
          unit_of_measurement: "%"

variables:
  kinvia_url: !input kinvia_url
  kinvia_api_key: !input kinvia_api_key
  battery_threshold: !input battery_threshold

trigger:
  # 1. Offline (Dispositivos)
  - id: offline
    platform: state
    entity_id: !input monitored_entities
    to:
      - unavailable
      - unknown
    for:
      minutes: 5
      
  # 2. Baterías
  - id: battery_low
    platform: numeric_state
    entity_id: !input battery_entities
    below: !input battery_threshold
    
  # 3. Core/Addons (Problemas de sistema)
  - id: system_problem
    platform: state
    entity_id: !input monitored_entities
    to: problem
    
  # 4. Reparaciones Nativas (Eventos internos de HA)
  - id: repair_event
    platform: event
    event_type: repairs_issue_registry_updated

condition: []

action:
  - variables:
      trigger_id: "{{ trigger.id }}"
      entity_id: >-
        {% if trigger.id == 'repair_event' %}
          repairs.{{ trigger.event.data.issue_id | default('unknown') }}
        {% else %}
          {{ trigger.entity_id }}
        {% endif %}
      friendly_name: >-
        {% if trigger.id == 'repair_event' %}
          HA Repair: {{ trigger.event.data.issue_id | default('unknown') }}
        {% else %}
          {{ state_attr(trigger.entity_id, 'friendly_name') | default(trigger.entity_id) }}
        {% endif %}
      domain: >-
        {% if trigger.id == 'repair_event' %}
          repairs
        {% else %}
          {{ trigger.entity_id.split('.')[0] }}
        {% endif %}
      device_class: >-
        {% if trigger.id == 'repair_event' %}
          {{ none }}
        {% else %}
          {{ state_attr(trigger.entity_id, 'device_class') | default(none) }}
        {% endif %}
      entity_state: >-
        {% if trigger.id == 'repair_event' %}
          updated
        {% else %}
          {{ trigger.to_state.state }}
        {% endif %}
      incident_type: >-
        {% if trigger.id == 'offline' %}
          state_change
        {% elif trigger.id == 'battery_low' %}
          battery_low
        {% elif trigger.id == 'system_problem' %}
          system_problem
        {% elif trigger.id == 'repair_event' %}
          repair_event
        {% else %}
          state_change
        {% endif %}
      details: >-
        {% if trigger.id == 'repair_event' %}
          {{ trigger.event.data | tojson }}
        {% else %}
          {{ '' }}
        {% endif %}
      
      # Construcción segura del JSON
      payload_json:
        incident_type: "{{ incident_type }}"
        entity_id: "{{ entity_id }}"
        friendly_name: "{{ friendly_name }}"
        domain: "{{ domain }}"
        device_class: "{{ device_class if device_class is not none else '' }}"
        state: "{{ entity_state }}"
        details: "{{ details if details != '' else none }}"

  - service: rest_command.kinvia_incident
    data:
      url: "{{ kinvia_url }}/api/v1/webhooks/incidents"
      api_key: "{{ kinvia_api_key }}"
      payload: "{{ payload_json | tojson }}"

mode: parallel
max: 20